version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crot
      POSTGRES_PASSWORD: crot
      POSTGRES_DB: crot
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://crot:crot@db:5432/crot?schema=public
      JWT_SECRET: change-this-secret
      SERVICE_PASSKEY: restaurant-pass-123
      SUPER_ADMIN_NAME: Super Admin
      SUPER_ADMIN_EMAIL: admin@crot.local
      SUPER_ADMIN_PASSWORD: admin123
      IYZICO_API_KEY: sandbox-p7AaoenuBsX5qcuUzWcpfBPwbURboVD7
      IYZICO_SECRET_KEY: sandbox-72W06YTdwZf6e1TEAhF1nIEF5CP1OjCB
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      API_URL: ${API_URL:-http://localhost:4000}
    ports:
      - "4000:4000"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npx prisma db push --accept-data-loss && npx prisma generate && node prisma/seed.js && npm run dev"

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    command: npm run dev

volumes:
  db_data:
  api_node_modules:
  web_node_modules:
